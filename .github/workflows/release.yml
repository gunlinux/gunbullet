name: Release

# Publishes to PyPI only when BOTH conditions are met:
#   1. The CI workflow passes on main, AND
#   2. The commit that CI ran on carries a v* tag.
# This guarantees the test suite is green before anything reaches PyPI.
#
# Setup required once before the first release:
#   1. Create the PyPI project's trusted publisher pointing at this repo +
#      this workflow file (https://docs.pypi.org/trusted-publishers/).
#   2. Create a GitHub Environment named "pypi" (Settings > Environments).
#
# workflow_dispatch builds the sdist/wheel for the current HEAD as a dry run
# (no tag required, the publish step is always skipped).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: Detect version tag on CI commit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.find.outputs.tag }}
      sha: ${{ steps.find.outputs.sha }}
    steps:
      - name: Find v* tag on this commit
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          # /tags gives peeled commit SHAs (annotated-tag safe).
          # Pipe into jq so --arg works; gh api --jq takes only one string arg.
          TAG=$(gh api "repos/${{ github.repository }}/tags" \
            | jq -r --arg sha "$SHA" \
            '[.[] | select(.commit.sha == $sha and (.name | startswith("v")))] |
             if length > 0 then .[0].name else "" end')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Detected tag: ${TAG:-<none>} on ${SHA}"

  # Compiled abi3 wheels (one per platform, Python 3.10+) built by maturin.
  wheels:
    name: Build wheel (${{ matrix.platform.target }} on ${{ matrix.platform.runner }})
    needs: detect
    if: >-
      needs.detect.outputs.tag != '' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: ubuntu-latest, target: aarch64 }
          - { runner: macos-latest, target: aarch64 }
          - { runner: macos-13, target: x86_64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # manylinux: auto cross-builds the Linux targets in a container.
          manylinux: auto
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  # Source distribution -- the pure-Python PyRouter fallback makes this
  # installable (slower) even where no prebuilt wheel matches.
  sdist:
    name: Build sdist
    needs: detect
    if: >-
      needs.detect.outputs.tag != '' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [detect, wheels, sdist]
    if: needs.detect.outputs.tag != ''
    environment: pypi
    permissions:
      id-token: write # trusted publishing; no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          # Collect every wheels-* and the sdist artifact into one dir.
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
