name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: code quality (lint + types + rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Install dev dependencies (compiles the Rust router)
        run: uv sync --dev

      - name: Lint (ruff)
        run: make lint

      - name: Type-check (pyright)
        run: make types

      - name: Rust router unit tests
        run: make rust-test

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies (compiles the Rust router)
        run: uv sync --dev

      - name: Run the suite (Rust router backend)
        run: make test

      - name: Routing benchmarks (Rust backend)
        run: make bench
